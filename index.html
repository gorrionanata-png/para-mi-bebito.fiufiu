<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi bebito fiu fiu ❤️</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b1a10; font-family: 'Segoe UI', sans-serif; color: #e2ebd5; min-height: 100vh; overflow-x: hidden; }

        /* PANTALLA DE BIENVENIDA */
        #pantallaInicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b1a10; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .btn-inicio { padding: 20px 40px; font-size: 1.5rem; border-radius: 50px; border: none; background: #57cc99; color: #0b1a10; cursor: pointer; font-weight: bold; }

        /* EL RESTO DEL DISEÑO (OCULTO AL INICIO) */
        #contenidoPrincipal { display: none; }
        
        /* MANTENEMOS TU DISEÑO ANTERIOR */
        body { background-image: radial-gradient(circle at 80% 20%, rgba(34, 76, 50, 0.6) 0%, transparent 50%), radial-gradient(circle at 20% 80%, rgba(18, 48, 30, 0.8) 0%, transparent 60%); background-attachment: fixed; }
        .contenedor { width: 95%; max-width: 750px; margin: auto; padding: 60px 0; display: flex; flex-direction: column; align-items: center; }
        .marco-blanco { border-radius: 20px; border: 6px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin: 30px 0; }
        .video-centro { width: 85%; max-width: 600px; }
        .fila-laterales { display: flex; justify-content: space-between; width: 100%; gap: 20px; }
        .foto-lateral { width: 45%; border-radius: 20px; border: 6px solid white; }
        .btn-accion { padding: 16px 45px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; }
        #btnSi { background-color: #2e7d32; color: white; }
        #btnNo { background-color: #e57373; color: white; position: absolute; }
        #modalExito { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(11, 40, 20, 0.95); padding: 40px; border-radius: 32px; z-index: 2000; text-align: center; width: 80%; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:1999; }
    </style>
</head>
<body>

    <div id="pantallaInicio">
        <h1 style="color:white; margin-bottom: 30px;">¡Hola, amor! ❤️</h1>
        <button class="btn-inicio" onclick="iniciarExperiencia()">Para mi bebito fiu fiu</button>
    </div>

    <div id="contenidoPrincipal">
        <audio id="miMusica" loop preload="auto">
            <source src="musica.mp3" type="audio/mpeg">
        </audio>

        <div class="contenedor">
            <h1>Para mi persona favorita... 👑❤️</h1>
            
            <div class="fila-laterales">
                <img src="mascaras.jpeg" class="foto-lateral">
                <img src="mascarillas.jpeg" class="foto-lateral">
            </div>

            <p style="font-size: 1.3rem; text-align: center; max-width: 600px; margin: 30px 0;">
                Amor, solo quería recordarte antes de tu examen lo orgullosa que estoy de ti. Sé lo importante que es para ti y también sé todo el esfuerzo, tiempo y dedicación que le has puesto.
            </p>

            <video autoplay muted loop playsinline class="marco-blanco video-centro">
                <source src="coqueto.mp4" type="video/mp4">
            </video>

            <div class="fila-laterales">
                <img src="pepito.jpeg" class="foto-lateral">
                <img src="angel.jpeg" class="foto-lateral">
            </div>

            <video autoplay muted loop playsinline class="marco-blanco video-centro">
                <source src="terry.mp4" type="video/mp4">
            </video>

            <div class="botones" style="height: 150px; position: relative;">
                <button id="btnSi" class="btn-accion" onclick="mostrarExito()">¡Sí, lo haré! 🧠✨</button>
                <button id="btnNo" class="btn-accion">No puedo...</button>
            </div>
        </div>
    </div>

    <div id="overlay"></div>
    <div id="modalExito">
        <h2 style="color: #57cc99;">¡Esa es la actitud, mi amor! 🏆🎉</h2>
        <button onclick="cerrarModal()" style="padding: 15px; border-radius: 20px; border:none; cursor:pointer;">Cerrar</button>
    </div>

    <script>
        function iniciarExperiencia() {
            // Ocultar inicio, mostrar contenido
            document.getElementById('pantallaInicio').style.display = 'none';
            document.getElementById('contenidoPrincipal').style.display = 'block';
            
            // Reproducir música
            const musica = document.getElementById('miMusica');
            musica.play();
        }

        const btnNo = document.getElementById('btnNo');
        btnNo.addEventListener('mouseenter', () => {
            btnNo.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btnNo.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        });

        function mostrarExito() {
            document.getElementById('modalExito').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function cerrarModal() {
            document.getElementById('modalExito').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
