<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi compañero favorito ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1a10;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(34, 76, 50, 0.6) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(18, 48, 30, 0.8) 0%, transparent 60%);
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            color: #e2ebd5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 95%;
            max-width: 750px;
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #57cc99; text-align: center; margin-bottom: 40px; }

        p.frase-central { 
            font-size: 1.3rem; line-height: 1.6; text-align: center; margin: 30px 0; 
            max-width: 600px;
        }

        .video-centro {
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            border: 5px solid white;
            margin: 20px 0;
        }

        .botones { display: flex; gap: 20px; margin-top: 30px; }

        .btn-accion {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        #btnSi { background-color: #57cc99; color: #0b1a10; }
        #btnNo { background-color: #e57373; color: white; }

        #modalExito {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(11, 40, 20, 0.98);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <audio id="miMusica" loop preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="contenedor">
        <h1>PARA MI COMPAÑERO FAVORITO 🏆❤️</h1>
        
        <p class="frase-central">
            Amor, solo quería recordarte antes de tu examen lo orgullosa que estoy de ti... (aquí va tu texto)
        </p>

        <video autoplay muted loop playsinline class="video-centro">
            <source src="coqueto.mp4" type="video/mp4">
        </video>

        <div class="botones">
            <button id="btnSi" onclick="mostrarExito()">¡Sí, lo haré! 🧠✨</button>
            <button id="btnNo">No puedo...</button>
        </div>
    </div>

    <div id="modalExito">
        <h2>¡Esa es la actitud, mi amor! 🏆🎉</h2>
        <button onclick="cerrarModal()">Llevarte en mi corazón siempre ❤️</button>
    </div>

    <script>
        const musica = document.getElementById('miMusica');
        const btnNo = document.getElementById('btnNo');

        // Esta función intenta reproducir al tocar cualquier lugar
        function intentarReproducir() {
            musica.play().then(() => {
                document.removeEventListener('click', intentarReproducir);
            }).catch(e => console.log("Esperando clic"));
        }
        document.addEventListener('click', intentarReproducir);

        function moverBotonNo() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            btnNo.style.position = 'fixed';
            btnNo.style.left = `${x}px`;
            btnNo.style.top = `${y}px`;
        }

        btnNo.addEventListener('mouseenter', moverBotonNo);
        btnNo.addEventListener('touchstart', moverBotonNo);

        function mostrarExito() {
            document.getElementById('modalExito').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('modalExito').style.display = 'none';
        }
    </script>
</body>
</html>
